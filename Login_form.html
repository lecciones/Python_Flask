<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AeroTicket Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='login.css') }}">
</head>
<body>

    <header class="main-header">
        <div class="header-container">
            <div class="logo">
                <img src="https://via.placeholder.com/120x40?text=AeroTicket" alt="Logo"> </div>
            
            <nav class="nav-links">
                <a href="#">Book</a>
                <a href="#">Manage</a>
                <a href="#">Travel Info</a>
                <a href="#">Explore</a>
                <a href="#">About</a>
            </nav>

            <div class="header-right">
                <a href="#" class="login-link"><i class="fas fa-user-circle"></i> Log in</a>
                <i class="fas fa-search search-icon"></i>
            </div>
        </div>
    </header>

    <div class="modal-overlay">
        <div class="login-card">
            <span class="close-btn">&times;</span>
            <div class="card-logo-container">
                <img src="https://via.placeholder.com/80x40?text=Logo" alt="Card Logo">
            </div>
            <h1>Hello!</h1>
            
            <p class="signup-text">Don't have an account? <a href="#">Sign up</a></p>
            
            <form action="/login" method="POST">
                <div class="input-group">
                    <input type="email" name="email" placeholder="Email" required>
                </div>
                <div class="input-group">
                    <input type="password" name="password" placeholder="Password" required>
                    <i class="far fa-eye eye-icon"></i>
                </div>
                <a href="#" class="forgot-link">Forgot password</a>
                <button type="submit" class="login-btn">Login</button>
            </form>
            
            <a href="#" class="guest-link">Continue as guest</a>
            <div class="divider">or</div>
            
            <div class="social-container">
                <div class="social-item"><i class="fab fa-google"></i><span>Google</span></div>
                <div class="social-item"><i class="fab fa-apple"></i><span>Apple</span></div>
                <div class="social-item"><i class="fab fa-weixin"></i><span>WeChat</span></div>
            </div>
        </div>
    </div>

</body>
</html>
