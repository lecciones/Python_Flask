<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AeroTicket Integrations</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #87CEFA; } /* Matching the sky blue background */
    </style>
</head>
<body class="min-h-screen font-sans">

    <nav class="bg-white px-10 py-4 flex justify-between items-center shadow-sm">
        <div class="flex items-center space-x-2">
            <div class="text-blue-400 font-bold text-xl italic">AeroTicket</div>
        </div>
        <div class="hidden md:flex space-x-8 text-blue-400 font-semibold">
            <a href="#" class="hover:text-blue-600">Book</a>
            <a href="#" class="hover:text-blue-600">Manage</a>
            <a href="#" class="hover:text-blue-600">Travel Info</a>
            <a href="#" class="hover:text-blue-600">Explore</a>
            <a href="#" class="hover:text-blue-600">About</a>
        </div>
        <div class="flex items-center space-x-4 text-blue-400">
            <div class="flex items-center space-x-1 cursor-pointer">
                <span>👤</span>
                <span class="font-semibold">Log in</span>
            </div>
            <span class="cursor-pointer">🔍</span>
        </div>
    </nav>

    <main class="flex justify-center items-center py-20 px-4">
        <div class="bg-white w-full max-w-4xl rounded-sm shadow-2xl p-8">
            
            <div class="flex justify-between items-center mb-6">
                <h1 class="text-2xl font-bold text-gray-800">Integrations</h1>
                <button class="bg-sky-400 text-white px-4 py-1.5 rounded-full text-sm font-medium hover:bg-sky-500 transition">
                    Add Integration
                </button>
            </div>

            <div class="border-b border-gray-200 mb-6">
                <nav class="flex space-x-8">
                    <button class="border-b-2 border-sky-400 pb-2 px-1 text-sm font-bold text-gray-800">
                        Integrate Payment Methods
                    </button>
                </nav>
            </div>

            <div class="flex flex-wrap gap-4 mb-8">
                <select class="border border-gray-200 rounded px-3 py-2 text-sm text-gray-500 w-32 bg-gray-50">
                    <option>Sort</option>
                </select>
                <select class="border border-gray-200 rounded px-3 py-2 text-sm text-gray-500 w-32 bg-gray-50">
                    <option>Type</option>
                </select>
                <select class="border border-gray-200 rounded px-3 py-2 text-sm text-gray-500 w-32 bg-gray-50">
                    <option>Country</option>
                </select>
                <input type="text" placeholder="Search..." class="border border-gray-200 rounded px-3 py-2 text-sm flex-grow bg-gray-50 outline-none">
            </div>

            <div class="grid grid-cols-2 md:grid-cols-5 gap-4">
                {% for item in integrations %}
                <div class="border border-gray-100 rounded-lg p-6 flex items-center justify-center h-24 hover:shadow-lg hover:border-sky-200 transition-all cursor-pointer group bg-white">
                    <img src="{{ item.logo }}" alt="{{ item.name }}" class="max-h-full max-w-full object-contain filter grayscale group-hover:grayscale-0 transition">
                </div>
                {% endfor %}
            </div>

        </div>
    </main>

</body>
</html>
