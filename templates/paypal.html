<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PayPal Checkout</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='paypal.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="paypal-wrapper">
        <div class="paypal-card">
            <div class="paypal-header">
                <img src="https://upload.wikimedia.org/wikipedia/commons/b/b5/PayPal.svg" alt="PayPal" class="pp-logo">
            </div>

            <div class="summary-section">
                <div class="amount-line">
                    <span class="currency-code">INR</span>
                    <span class="total-amount">₹{{ amount }}</span>
                    <span class="chevron">▼</span>
                </div>
                <p class="merchant-name">AeroTicket International Ltd.</p>
            </div>

            <div class="pp-content">
                <h2 class="pay-with-title">Pay with</h2>
                
                <div class="payment-option selected">
                    <div class="option-icon">
                        <img src="https://img.icons8.com/color/48/000000/visa.png" alt="Visa">
                    </div>
                    <div class="option-details">
                        <span class="card-name">Visa •••• 4242</span>
                        <span class="card-sub">Preferred</span>
                    </div>
                    <div class="check-mark">L</div>
                </div>

                <div class="payment-option">
                    <div class="option-icon">
                        <img src="https://img.icons8.com/color/48/000000/paypal.png" alt="Balance">
                    </div>
                    <div class="option-details">
                        <span class="card-name">PayPal Balance</span>
                        <span class="card-sub">₹0.00</span>
                    </div>
                </div>

                <div class="reward-toggle">
                    <span>Rewards available</span>
                    <div class="toggle-switch"></div>
                </div>
            </div>

            <div class="pp-actions">
                <button onclick="handlePay()" class="btn-complete">Complete Purchase</button>
                <div class="security-footer">
                    <p>Your payment is secure. We don't share your full financial info with the merchant.</p>
                </div>
            </div>
        </div>

        <div class="footer-links">
            <a href="#">Cancel and return to AeroTicket</a>
            <div class="legal-links">
                <a href="#">Policies</a>
                <a href="#">Terms</a>
                <a href="#">Privacy</a>
                <a href="#">Feedback</a>
            </div>
        </div>
    </div>

    <script>
        function handlePay() {
            const btn = document.querySelector('.btn-complete');
            btn.innerHTML = '<div class="spinner"></div>';
            btn.style.pointerEvents = 'none';
            
            setTimeout(() => {
                window.location.href = "{{ url_for('ticket') }}";
            }, 2500);
        }
    </script>
</body>
</html>
