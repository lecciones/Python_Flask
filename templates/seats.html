<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AeroTicket - Seat Selection</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='seat.css') }}" />
    <style>
        .flight-info-bar {
            background: linear-gradient(135deg, #4eb8e9 0%, #2c8fbb 100%);
            color: white;
            padding: 15px 20px;
            margin: 20px auto;
            border-radius: 12px;
            max-width: 1200px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }
        .flight-info-item {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
        }
        .flight-info-item i {
            font-size: 18px;
        }
        .flight-info-item strong {
            margin-right: 5px;
        }
    </style>
</head>
<body>
    <header class="main-header">
        <div class="logo">
            <a href="{{ url_for('home') }}">
                <img src="{{ url_for('static', filename='images/logo.png') }}" alt="AeroTicket Logo">
            </a>
        </div>
        
        <nav class="nav-links">
            <a href="{{ url_for('booking')}}">Book</a>
            <a href="{{ url_for('manage')}}">Manage</a>
            <a href="{{ url_for('travel')}}">Travel Info</a>
            <a href="{{ url_for('explore')}}">Explore</a>
            <a href="{{ url_for('about')}}">About</a>
        </nav>

        <div class="header-right">
            {% if session.get('user_id') %}
                <a href="{{ url_for('logout') }}" class="login-link">
                    <i class="fas fa-sign-out-alt"></i> Log out
                </a>
            {% else %}
                <a href="{{ url_for('login') }}" class="login-link">
                    <i class="fas fa-user-circle"></i> Log in
                </a>
            {% endif %}
            <i class="fas fa-search search-icon"></i>
        </div>
    </header>

    <main class="content">
        <!-- Flight Information Bar -->
        <div class="flight-info-bar">
            <div class="flight-info-item">
                <i class="fas fa-plane-departure"></i>
                <span><strong>{{ origin }}</strong> → <strong>{{ destination }}</strong></span>
            </div>
            <div class="flight-info-item">
                <i class="far fa-calendar-alt"></i>
                <span>{{ flight_date }}</span>
            </div>
            <div class="flight-info-item">
                <i class="far fa-clock"></i>
                <span>{{ flight_time }}</span>
            </div>
            <div class="flight-info-item">
                <i class="fas fa-tag"></i>
                <span>Flight: {{ flight_no }}</span>
            </div>
            <div class="flight-info-item">
                <i class="fas fa-chair"></i>
                <span>{{ passengers.cabin }}</span>
            </div>
            <div class="flight-info-item">
                <i class="fas fa-ticket-alt"></i>
                <span>₱{{ price }}/passenger</span>
            </div>
        </div>

        <section class="search-section">
            <div class="search-bar-wrapper">
                <input type="text" id="seatSearch" placeholder="search seat (e.g. 5A)" class="slim-search">
                <div class="search-inside">
                    <i class="fas fa-search"></i>
                </div>
            </div>
        </section>

        <div class="booking-layout">
            <div class="seat-map-container">
                <div class="seat-map" id="seatMap">
                    </div>
            </div>

            <div class="selection-sidebar">
                <p id="selectionText">Please select seats for <span id="passengerLimitDisplay">1</span> passenger(s)</p>
                <div class="seat-card" id="seatNumber" onclick="confirmBooking()" style="cursor: pointer;">--</div>
            </div>
        </div>
    </main>

   <script>
    const seatMap = document.getElementById('seatMap');
    const seatNumberDisplay = document.getElementById('seatNumber');
    const selectionText = document.getElementById('selectionText');
    const seatSearch = document.getElementById('seatSearch');

    // Parse passenger count from URL
    const urlParams = new URLSearchParams(window.location.search);
    const adultCount = parseInt(urlParams.get('adults')) || 1;
    const childCount = parseInt(urlParams.get('children')) || 0;
    const totalPassengers = adultCount + childCount;
    
    // Capture flight data from Flask backend
    const flightOrigin = "{{ origin }}";
    const flightDestination = "{{ destination }}";
    const flightDate = "{{ flight_date }}";
    const flightTime = "{{ flight_time }}";
    const flightNo = "{{ flight_no }}";
    const flightPrice = "{{ price }}";
    const flightCabin = "{{ passengers.cabin }}";

    document.getElementById('passengerLimitDisplay').innerText = totalPassengers;

    let selectedSeats = [];

    const seatSvgContent = `
    <svg viewBox="0 0 100 100" preserveAspectRatio="xMidYMid meet">
        <rect x="34" y="2" width="32" height="14" rx="5" fill="currentColor"/>
        <path d="M22,35 Q22,22 50,22 Q78,22 78,35 L78,75 Q78,85 70,85 L30,85 Q22,85 22,75 Z" fill="currentColor"/>
        <rect x="22" y="88" width="56" height="8" rx="3" fill="currentColor"/>
    </svg>`;

    for (let i = 1; i <= 12; i++) {
        const row = document.createElement('div');
        row.className = 'seat-row';
        row.innerHTML = `
            <div class="seat-group">${generateSeats(i, ['A', 'B', 'C'])}</div>
            <div class="seat-group">${generateSeats(i, ['D', 'E'])}</div>
        `;
        seatMap.appendChild(row);
    }

    function generateSeats(rowNum, labels) {
        return labels.map(label => {
            const seatId = `${rowNum}${label}`;
            return `
                <div class="seat" data-id="${seatId}" onclick="updateSelection('${seatId}', this)">
                    ${seatSvgContent}
                </div>
            `;
        }).join('');
    }

    function updateSelection(id, element) {
        const index = selectedSeats.indexOf(id);

        if (index > -1) {
            // Already selected, so remove it
            selectedSeats.splice(index, 1);
            element.classList.remove('selected');
        } else {
            // New selection - check if we hit the limit
            if (selectedSeats.length < totalPassengers) {
                selectedSeats.push(id);
                element.classList.add('selected');
            } else {
                alert(`You can only select ${totalPassengers} seat(s).`);
            }
        }

        // Update display text
        if (selectedSeats.length > 0) {
            seatNumberDisplay.innerText = selectedSeats.join(', ');
            selectionText.innerText = `You selected: ${selectedSeats.join(', ')}`;
        } else {
            seatNumberDisplay.innerText = "--";
            selectionText.innerText = `Please select seats for ${totalPassengers} passenger(s)`;
        }
    }

    seatSearch.addEventListener('input', (e) => {
        const query = e.target.value.toUpperCase();
        const allSeats = document.querySelectorAll('.seat');
        
        allSeats.forEach(seat => {
            const seatId = seat.getAttribute('data-id');
            if (query === "") {
                seat.style.opacity = "1";
                seat.style.transform = "scale(1)";
            } else if (seatId.includes(query)) {
                seat.style.opacity = "1";
                seat.style.transform = "scale(1.1)";
            } else {
                seat.style.opacity = "0.3";
                seat.style.transform = "scale(1)";
            }
        });
    });

    function confirmBooking() {
        if (selectedSeats.length === 0) {
            alert("Please select at least one seat.");
            return;
        }

        if (selectedSeats.length < totalPassengers) {
            if (!confirm(`You have only selected ${selectedSeats.length} out of ${totalPassengers} seats. Proceed anyway?`)) {
                return;
            }
        }

        // Capture all existing parameters from URL
        const currentParams = new URLSearchParams(window.location.search);
        
        // Add the selected seats
        currentParams.set('seat', selectedSeats.join(','));
        
        // Make sure all flight data is included in the URL
        currentParams.set('origin', flightOrigin);
        currentParams.set('destination', flightDestination);
        currentParams.set('date', flightDate);
        currentParams.set('time', flightTime);
        currentParams.set('flight_no', flightNo);
        currentParams.set('price', flightPrice);
        currentParams.set('cabin', flightCabin);
        currentParams.set('adults', adultCount);
        currentParams.set('children', childCount);
        
        // Also pass infant count if exists
        const infantCount = parseInt(urlParams.get('infants')) || 0;
        if (infantCount > 0) {
            currentParams.set('infants', infantCount);
        }

        // Pass the baton to the booking page with all parameters
        window.location.href = "{{ url_for('booking') }}?" + currentParams.toString();
    }
</script>
</body>
</html>
