<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AeroTicket - Create Account</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='signup.css') }}">
</head>
<body>

    <header class="main-header">
        <div class="header-container">
            <div class="logo">
                 <a href="{{ url_for('home') }}">
        <img src="{{ url_for('static', filename='images/logo.png') }}" alt="AeroTicket Logo">
    </a>
            </div>
             <nav class="nav-links">
            <a href="{{ url_for('booking') }}">Book</a>
            <a href="{{ url_for('manage') }}">Manage</a>
            <a href="{{ url_for('travel') }}">Travel Info</a>
            <a href="{{ url_for('explore') }}">Explore</a>
            <a href="{{ url_for('about') }}">About</a>
        </nav>
            <div class="header-right">
                <a href="{{ url_for('login') }}" class="login-link"><i class="fas fa-user-circle"></i> Log in</a>
            </div>
        </div>
    </header>

    <div class="modal-overlay">
        <div class="login-card">
            <span class="close-btn">&times;</span>
            <div class="card-logo-container">
                <img src="{{ url_for('static', filename='images/logo.png') }}" alt="Card Logo">
            </div>
            <h1>Create Account</h1>
            <p class="signup-text">Already have an account? <a href="{{ url_for('login') }}">Log in</a></p>
            
            <form action="/register" method="POST">
                <div class="input-group">
                    <input type="text" name="fullname" placeholder="Full Name" required>
                </div>
                <div class="input-group">
                    <input type="email" name="email" placeholder="Email Address" required>
                </div>
                <div class="input-group">
                    <input type="password" name="password" id="password" placeholder="Password" required>
                    <i class="far fa-eye eye-icon" id="togglePassword" style="cursor: pointer;"></i>
                </div>
                <button type="submit" class="login-btn">Sign Up</button>
            </form>
            
            <div class="divider">or sign up with</div>
            
                      <div class="social-container">
    <a href="{{ url_for('google_login') }}" class="social-item">
        <i class="fab fa-google"></i>
        <span>Google</span>
    </a>

    <a href="{{ url_for('apple_login') }}" class="social-item">
        <i class="fab fa-apple"></i>
        <span>Apple</span>
    </a>

    <a href="{{ url_for('wechat_login') }}" class="social-item">
        <i class="fab fa-weixin"></i>
        <span>WeChat</span>
    </a>
</div>
            </div>
        </div>
    </div>

    <script>
     
        const togglePassword = document.querySelector('#togglePassword');
        const passwordInput = document.querySelector('#password');
        
        togglePassword.addEventListener('click', function() {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            this.classList.toggle('fa-eye');
            this.classList.toggle('fa-eye-slash');
        });


        document.querySelector('.close-btn').addEventListener('click', function() {
            window.location.href = "{{ url_for('home') }}";
        });
    </script>
</body>
</html>
