<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WeChat Login - AeroTicket</title>
      <link rel="stylesheet" href="{{ url_for('static', filename='wechat.css') }}">
       
 
</head>
<body>

<div class="wechat-card">
    <div class="logo-container">
        <svg class="wechat-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M8.22 3C4.23 3 1 5.72 1 9.08c0 1.87 1.03 3.53 2.65 4.67-.13.46-.47 1.66-.47 1.66l-.06.21.19-.11s1.37-.79 1.91-1.1c.33.05.66.08 1 .08.2 0 .39-.01.59-.03-.35-.74-.54-1.57-.54-2.45 0-3.08 3.12-5.58 6.96-5.58.33 0 .66.02.98.06C13.25 4.38 10.9 3 8.22 3zm9.03 5.45c-3.36 0-6.08 2.33-6.08 5.2 0 2.86 2.72 5.19 6.08 5.19.29 0 .57-.02.85-.06.45.27 1.62.94 1.62.94l.16.1-.05-.18s-.29-1.02-.4-1.42c1.37-.97 2.25-2.39 2.25-3.97 0-2.87-2.72-5.2-6.08-5.2z"/>
        </svg>
    </div>

    <h1>Log In via WeChat</h1>

    <form action="/login/wechat" method="POST">
        <div class="input-group">
            <div class="input-row">
                <div class="label">Account</div>
                <input type="text" name="wechat_id" placeholder="ID/Email/Mobile No." required autofocus>
            </div>
            <div class="input-row">
                <div class="label">Password</div>
                <input type="password" name="password" placeholder="Enter password" required>
            </div>
        </div>

        <button type="submit" class="login-btn">Log In</button>
    </form>

    <div class="options">
        <a href="#">Forgot Password?</a>
        <span style="color: #eeeeee;">|</span>
        <a href="#">More Options</a>
    </div>

    <div class="footer">
        Powered by AeroTicket Account
    </div>
</div>

</body>
</html>
